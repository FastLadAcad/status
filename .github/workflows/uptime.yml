name: Uptime CI
permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "uptime"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
