name: Static Site CI
permissions:
  contents: write
  issues: write
  pages: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      - name: Find and deploy site output
        run: |
          EXPORT_DIR=$(find . -path "*/__sapper__/export" -type d | head -1)
          if [ -z "$EXPORT_DIR" ]; then
            echo "ERROR: __sapper__/export directory not found"
            find . -name "index.html" -not -path "*/node_modules/*" | head -5
            exit 1
          fi
          echo "Found export at: $EXPORT_DIR"
          echo "PUBLISH_DIR=$EXPORT_DIR" >> $GITHUB_ENV
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLISH_DIR }}
